<!DOCTYPE html>
<html lang="en" class="antialiased selection:bg-[#f78f1e]/30 selection:text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendorya | Secure Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit','sans-serif'], mono: ['"JetBrains Mono"','monospace'] }, colors: { brand: { badge: '#27272A', accent: '#f78f1e' } } } } }</script>
    <style>
        body { background-color: #0F0F12; color: #fff; overflow-x: hidden; }
        .ambient-blob { position:absolute; border-radius:50%; pointer-events:none; z-index:0; background:radial-gradient(circle, var(--blob-color) 0%, transparent 60%); animation:float-drift 20s cubic-bezier(.4,0,.2,1) infinite alternate; }
        .blob-1 { --blob-color:rgba(247,143,30,0.85); width:70vw; height:70vw; top:-20%; left:-30%; animation-duration:25s; }
        .blob-2 { --blob-color:rgba(234,88,12,0.7); width:60vw; height:60vw; bottom:-10%; left:-15%; animation-duration:22s; animation-delay:-5s; }
        .blob-3 { --blob-color:rgba(253,186,116,0.4); width:50vw; height:50vw; top:40%; left:10%; animation-duration:28s; animation-delay:-12s; }
        .blob-4 { --blob-color:rgba(247,143,30,0.12); width:80vw; height:80vw; top:10%; right:-30%; animation-duration:30s; }
        @keyframes float-drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(3vw,-4vh) scale(1.05)} 66%{transform:translate(-2vw,2vh) scale(0.95)} 100%{transform:translate(1vw,-1vh) scale(1)} }
        .wave-1 { animation: breath-wave-1 22s cubic-bezier(.35,0,.25,1) infinite alternate; transform-origin: center bottom; }
        .wave-2 { animation: breath-wave-2 26s cubic-bezier(.35,0,.25,1) infinite alternate; transform-origin: center bottom; }
        @keyframes breath-wave-1 { 0%{transform:translateY(5%) scaleY(0.9)} 100%{transform:translateY(-5%) scaleY(1.15)} }
        @keyframes breath-wave-2 { 0%{transform:translateY(-3%) scaleY(1)} 100%{transform:translateY(8%) scaleY(1.25)} }
        .structural-glass { background:rgba(15,15,18,0.45); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-right:1px solid rgba(247,143,30,0.2); }
        .glass-input { background:linear-gradient(180deg,rgba(20,20,24,0.7) 0%,rgba(10,10,12,0.9) 100%); box-shadow:inset 0 4px 10px rgba(0,0,0,0.5); transition:all 0.3s; }
        .glass-input:focus-within { box-shadow:inset 0 4px 10px rgba(0,0,0,0.5), 0 0 25px -5px rgba(247,143,30,0.25); }
        .stagger-enter { opacity:0; transform:translateY(20px); animation:fade-up 0.8s cubic-bezier(.16,1,.3,1) forwards; }
        .d1{animation-delay:100ms} .d2{animation-delay:200ms} .d3{animation-delay:300ms} .d4{animation-delay:400ms} .d5{animation-delay:600ms}
        @keyframes fade-up { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
        .editorial-reveal { opacity:0; animation:slow-reveal 1.5s cubic-bezier(.2,.8,.2,1) forwards; animation-delay:400ms; }
        @keyframes slow-reveal { 0%{opacity:0;filter:blur(10px);transform:translateX(20px)} 100%{opacity:1;filter:blur(0);transform:translateX(0)} }
        input:-webkit-autofill, input:-webkit-autofill:focus { -webkit-box-shadow:0 0 0px 1000px #111114 inset; -webkit-text-fill-color:#fafafa; }
    </style>
</head>
<body class="antialiased min-h-[100dvh] w-full md:grid md:grid-cols-2 relative overflow-hidden">

    <!-- Wave background -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <svg class="w-full h-full" viewBox="0 0 1440 1000" preserveAspectRatio="none">
            <g class="wave-1"><path fill="rgba(200,200,220,0.13)" d="M0,600 C450,250 950,850 1440,550 L1440,1000 L0,1000 Z"/></g>
            <g class="wave-2"><path fill="rgba(247,143,30,0.28)" d="M0,750 C500,1000 1050,550 1440,700 L1440,1000 L0,1000 Z"/></g>
        </svg>
    </div>

    <!-- Blobs -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden mix-blend-screen">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
        <div class="ambient-blob blob-4"></div>
    </div>

    <!-- LEFT: Glass form -->
    <main class="relative z-10 w-full min-h-[100dvh] structural-glass flex flex-col justify-center px-6 sm:px-12 lg:px-20 xl:px-28 py-16">
        <div class="w-full max-w-md mx-auto">
            <div class="flex flex-col items-center mb-14 stagger-enter">
                <h1 class="text-white text-6xl font-black tracking-tighter uppercase mb-8">Vendorya<span class="text-[#f78f1e]">.</span></h1>
                <div class="inline-flex items-center gap-2 bg-[#27272A] rounded-lg px-4 py-2 stagger-enter d1">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#f78f1e] animate-pulse"></div>
                    <span class="text-white text-[11px] font-mono tracking-[0.15em] uppercase font-bold">Authentication Required</span>
                </div>
            </div>
            <form class="space-y-6" onsubmit="event.preventDefault()">
                <div class="group relative stagger-enter d2">
                    <div class="glass-input rounded-xl relative overflow-hidden">
                        <div class="absolute left-4 top-0 bottom-0 flex items-center pointer-events-none"><i class="ph ph-user text-zinc-500 text-lg"></i></div>
                        <input type="text" class="w-full bg-transparent text-zinc-100 placeholder:text-zinc-600 text-[15px] px-4 py-4 pl-[3.25rem] outline-none" placeholder="Email or Username">
                    </div>
                </div>
                <div class="group relative stagger-enter d3">
                    <div class="glass-input rounded-xl relative overflow-hidden">
                        <div class="absolute left-4 top-0 bottom-0 flex items-center pointer-events-none"><i class="ph ph-lock-key text-zinc-500 text-lg"></i></div>
                        <input type="password" class="w-full bg-transparent text-zinc-100 placeholder:text-zinc-600 text-[15px] px-4 py-4 pl-[3.25rem] pr-12 outline-none font-mono tracking-wider" placeholder="Access Password">
                        <button type="button" class="absolute right-4 top-0 bottom-0 flex items-center text-zinc-500 hover:text-white transition-colors"><i class="ph ph-eye text-lg"></i></button>
                    </div>
                </div>
                <div class="flex justify-end px-2 stagger-enter d4">
                    <a href="#" class="text-[13px] text-zinc-400 hover:text-[#f78f1e] transition-colors">Recover Access</a>
                </div>
                <button type="submit" class="relative group w-full bg-[#f78f1e] hover:bg-[#e07f18] text-zinc-950 font-bold text-[15px] tracking-wide rounded-xl py-4 transition-all duration-300 active:scale-[0.98] shadow-[0_10px_30px_-5px_rgba(247,143,30,0.3)] stagger-enter d5 flex items-center justify-center gap-2 overflow-hidden">
                    AUTHENTICATE <i class="ph-bold ph-arrow-right text-lg group-hover:translate-x-1 transition-transform duration-300"></i>
                    <div class="absolute inset-0 -translate-x-full group-hover:translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent transition-transform duration-700 skew-x-12"></div>
                </button>
            </form>
        </div>
    </main>

    <!-- RIGHT: Editorial -->
    <aside class="relative z-10 hidden md:flex flex-col justify-center px-16 lg:px-24 py-16">
        <div class="max-w-lg editorial-reveal">
            <h2 class="text-white text-5xl font-bold leading-[1.05] tracking-tight mb-8">AI that runs the<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-zinc-300 to-zinc-600">back office with you.</span></h2>
            <p class="text-xl text-zinc-400 font-light leading-relaxed">Vendorya ships with a built-in AI admin that understands your stock, your invoices, and your numbers. One person moving like a whole team.</p>
        </div>
    </aside>
</body>
</html>
