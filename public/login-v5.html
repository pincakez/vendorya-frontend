<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendorya - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@200;300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"','sans-serif'], display: ['Outfit','sans-serif'], mono: ['"JetBrains Mono"','monospace'] },
                colors: { brand: { DEFAULT: '#f78f1e', hover: '#e07a12' }, ui: { 950: '#050505', 900: '#0f0f11', 800: '#1a1a1d', border: '#27272a' } },
                keyframes: { fadeInUp: { '0%':{opacity:'0',transform:'translateY(16px)'}, '100%':{opacity:'1',transform:'translateY(0)'} }, drift: { '0%':{transform:'rotate(0deg)'}, '100%':{transform:'rotate(360deg)'} } },
                animation: { 'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards', drift: 'drift 40s linear infinite' }
            }}
        }
    </script>
    <style>
        :root { background-color: #050505; color: #fff; scrollbar-width: none; }
        body { -webkit-font-smoothing: antialiased; }
        .bg-architect { position:absolute; inset:0; z-index:0; background:#050505; overflow:hidden; }
        .bg-grid {
            position:absolute; inset:0;
            background-image: linear-gradient(to right,rgba(255,255,255,0.025) 1px,transparent 1px), linear-gradient(to bottom,rgba(255,255,255,0.025) 1px,transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at 70% 50%, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at 70% 50%, black 30%, transparent 80%);
        }
        .bg-pockets::before { content:''; position:absolute; top:-20%; right:-10%; width:80vw; height:80vh; background:radial-gradient(ellipse, rgba(247,143,30,0.07) 0%, transparent 60%); animation: drift 40s linear infinite reverse; }
        .bg-pockets::after  { content:''; position:absolute; bottom:-30%; left:20%; width:60vw; height:60vh; background:radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 70%); }
        .noise-layer { position:absolute; inset:0; z-index:1; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity:0.04; mix-blend-mode:overlay; }
        .glass-panel { background:rgba(5,5,5,0.42); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); }
        input:-webkit-autofill, input:-webkit-autofill:focus { -webkit-box-shadow:0 0 0 30px #0f0f11 inset !important; -webkit-text-fill-color:white !important; }
        .prime-input { width:100%; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:2px; color:#fff; padding:1.25rem 1rem 0.5rem 1rem; font-size:0.875rem; outline:none; transition:all 0.2s; font-family:'Plus Jakarta Sans',sans-serif; }
        .prime-input:hover { background:rgba(255,255,255,0.04); }
        .prime-input:focus { border-color:#f78f1e; background:rgba(247,143,30,0.02); }
        .prime-label { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:#71717a; font-size:0.875rem; pointer-events:none; transition:all 0.2s; }
        .prime-input:focus + .prime-label, .prime-input:not(:placeholder-shown) + .prime-label { top:0.6rem; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.05em; color:#a1a1aa; }
        .prime-input:focus + .prime-label { color:#f78f1e; }
        .input-group { position:relative; display:flex; flex-direction:column; }
        .stagger-1{animation-delay:100ms;opacity:0} .stagger-2{animation-delay:220ms;opacity:0} .stagger-3{animation-delay:340ms;opacity:0} .stagger-4{animation-delay:460ms;opacity:0} .stagger-5{animation-delay:600ms;opacity:0}
        .btn-submit:active { transform:scale(0.98); }
        @keyframes drift { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-[100dvh] w-full selection:bg-[#f78f1e] selection:text-black overflow-hidden">

    <div class="bg-architect">
        <div class="bg-grid"></div>
        <div class="bg-pockets"></div>
    </div>
    <div class="noise-layer"></div>

    <!-- LEFT -->
    <main class="glass-panel relative z-20 w-full md:w-[44%] min-h-[100dvh] flex flex-col justify-center px-10 py-12 md:px-16 xl:px-24">
        <div class="w-full max-w-sm mx-auto flex flex-col items-start">

            <div class="flex flex-col gap-5 w-full mb-12 animate-fade-in-up stagger-1">
                <h1 class="font-display text-4xl font-semibold tracking-tight text-white">Vendorya<span class="text-[#f78f1e]">.</span></h1>
                <div class="bg-[#1a1a1d] border border-[#27272a] px-3 py-1.5 rounded-full w-max flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#f78f1e] animate-pulse"></div>
                    <span class="font-mono text-[10px] uppercase tracking-wider text-zinc-300">Authentication Required</span>
                </div>
            </div>

            <form class="w-full flex flex-col gap-5" onsubmit="event.preventDefault()">
                <div class="input-group animate-fade-in-up stagger-2">
                    <input type="email" class="prime-input" placeholder=" " autocomplete="email"/>
                    <label class="prime-label">Email or Username</label>
                </div>
                <div class="input-group animate-fade-in-up stagger-3">
                    <div class="relative w-full">
                        <input type="password" id="pw" class="prime-input" placeholder=" " autocomplete="current-password"/>
                        <label class="prime-label">Access Password</label>
                        <button type="button" onclick="var i=document.getElementById('pw');i.type=i.type==='password'?'text':'password'" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-300 transition-colors">
                            <i class="ph ph-eye text-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="flex justify-end animate-fade-in-up stagger-3">
                    <a href="#" class="text-xs text-zinc-500 hover:text-white transition-colors">Recover Access</a>
                </div>
                <button type="submit" class="btn-submit animate-fade-in-up stagger-4 mt-2 w-full bg-[#f78f1e] hover:bg-[#e07a12] text-black font-semibold py-4 px-4 rounded-sm flex items-center justify-center gap-2 transition-all duration-200 text-sm tracking-widest uppercase">
                    Authenticate <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>

            <div class="mt-auto pt-16 w-full flex justify-between text-[10px] font-mono text-zinc-700 animate-fade-in-up stagger-5">
                <span>VENDORYA OS</span><span>v4.2</span>
            </div>
        </div>
    </main>

    <!-- RIGHT -->
    <aside class="relative z-10 hidden md:flex flex-1 min-h-[100dvh] items-center px-16 lg:px-28">
        <div class="max-w-xl animate-fade-in-up stagger-3">
            <span class="font-mono text-[#f78f1e] text-xs tracking-[0.2em] uppercase block mb-8">Enterprise ERP</span>
            <h2 class="font-display text-5xl lg:text-6xl leading-[1.05] tracking-[-0.03em] font-light text-white mb-8">
                AI that runs<br/>
                <span class="text-zinc-500 italic">the back office</span><br/>
                with you.
            </h2>
            <p class="text-lg text-zinc-500 leading-relaxed max-w-md">
                Vendorya ships with a built-in AI admin that understands your stock, your invoices, and your numbers. One person moving like a whole team.
            </p>
        </div>
    </aside>
</body>
</html>
